name: Regenerate parser

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  regenerate:
    uses: tree-sitter/workflows/.github/workflows/regenerate.yml@cc03699ad21049475b5762cd1c38a35146691e85
    if: "!github.event.repository.is_template && github.actor == 'dependabot[bot]'"
